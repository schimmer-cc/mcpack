name: Release Resource Pack

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Package resource pack
        run: |
          rm -f erfahrung.zip
          zip -r erfahrung.zip pack.mcmeta assets LICENSE

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest erfahrung.zip \
            --title "Latest" \
            --notes "Built from ${{ github.sha }}" \
            --latest
